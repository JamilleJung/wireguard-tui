version: 2
updates:
  # Surface vulnerable / outdated Rust dependencies (Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
  # Keep the SHA-pinned GitHub Actions current (security patches).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
