name: Release

# Tag a version to cut a release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build artifacts & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release

      # ---------------- binary tarball ----------------
      - name: Build binary tarball
        run: |
          V="${{ steps.ver.outputs.v }}"
          D="wireguard-tui-${V}-x86_64-linux"
          mkdir -p "$D"
          cp target/release/wg-tui "$D/"
          cp packaging/wg-helper "$D/"
          cp packaging/wireguard-tui.desktop "$D/"
          cp packaging/49-wireguard-tui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      # ---------------- .deb ----------------
      - name: Build .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --no-strip || cargo deb
          cp target/debian/*.deb . || true

      # ---------------- checksums ----------------
      - name: Generate checksums
        run: |
          sha256sum *.tar.gz *.deb 2>/dev/null | tee SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.deb
            SHA256SUMS
