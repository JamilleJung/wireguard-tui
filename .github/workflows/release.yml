name: Release

# Tag a version to cut a release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  arm64-tarball:
    name: Build aarch64 tarball
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - name: Smoke helper and CLI
        run: |
          ./target/release/wg-tui --version | grep -q '^wg-tui '
          ./target/release/wg-tui --help >/dev/null
          bash tests/helper-validation.sh target/release/wg-helper

      - name: Build aarch64 tarball
        run: |
          V="${{ steps.ver.outputs.v }}"
          D="wireguard-tui-${V}-aarch64-linux"
          mkdir -p "$D"
          cp target/release/wg-tui "$D/"
          cp target/release/wg-helper "$D/"
          cp packaging/49-wireguard-tui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      - name: Upload aarch64 tarball
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-tui-aarch64-tarball
          path: wireguard-tui-*-aarch64-linux.tar.gz
          if-no-files-found: error

  release:
    name: Build artifacts & publish release
    needs: arm64-tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - name: Smoke and shell validation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          ./target/release/wg-tui --version | grep -q '^wg-tui '
          ./target/release/wg-tui --help >/dev/null
          out="$(./target/release/wg-tui doctor)" && rc=0 || rc=$?
          echo "$out" | grep -q 'WireGuard tools'
          test "$rc" -le 2
          bash -n install.sh
          bash -n tests/helper-validation.sh
          bash -n tests/installer-sanity.sh
          shellcheck -S warning install.sh tests/helper-validation.sh tests/installer-sanity.sh
          bash tests/helper-validation.sh target/release/wg-helper
          bash tests/installer-sanity.sh

      # ---------------- binary tarball ----------------
      - name: Build binary tarball
        run: |
          V="${{ steps.ver.outputs.v }}"
          D="wireguard-tui-${V}-x86_64-linux"
          mkdir -p "$D"
          cp target/release/wg-tui "$D/"
          cp target/release/wg-helper "$D/"
          cp packaging/49-wireguard-tui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      - name: Download aarch64 tarball
        uses: actions/download-artifact@v4
        with:
          name: wireguard-tui-aarch64-tarball
          path: .

      # ---------------- .deb ----------------
      - name: Build .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --no-strip || cargo deb
          cp target/debian/*.deb .   # mandatory: fail the release if none exists

      # ---------------- checksums ----------------
      - name: Generate checksums
        run: |
          shopt -s nullglob
          artifacts=( *.tar.gz *.deb )
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::no artifacts to checksum"; exit 1
          fi
          sha256sum "${artifacts[@]}" | tee SHA256SUMS
          test -s SHA256SUMS

      # ---------------- sign the checksums (minisign) ----------------
      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then
            echo "::warning::MINISIGN_KEY secret not set — skipping signature"
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y --no-install-recommends minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          minisign -S -s minisign.key -m SHA256SUMS \
            -t "wireguard-tui ${{ steps.ver.outputs.v }}"
          rm -f minisign.key
          echo "Verifying signature with the committed public key…"
          minisign -Vm SHA256SUMS -p minisign.pub

      - name: Publish GitHub Release
        - name: Prepare release notes
          id: notes
          run: |
            V="${{ steps.ver.outputs.v }}"
            notes=$(awk -v ver="$V" 'BEGIN{p=0} /^## \['ver'\]/{p=1; print; next} /^## \[/{if(p){exit}} p{print}' CHANGELOG.md)
            if [ -z "${notes// }" ]; then
              notes="Release $V"
            fi
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            printf "%s\n" "$notes" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

        - name: Publish GitHub Release
          uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
          with:
            generate_release_notes: false
            body: ${{ steps.notes.outputs.body }}
            files: |
              *.tar.gz
              *.deb
              SHA256SUMS
              SHA256SUMS.minisig
              minisign.pub
              wireguard-tui/CHANGELOG.md
