name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI never needs to write; keep the token read-only regardless of repo default.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build, fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Build (release)
        run: cargo build --release

      - name: Smoke test (binary starts & parses args)
        run: |
          ./target/release/wg-tui --version | grep -q '^wg-tui '
          ./target/release/wg-tui --help >/dev/null
          # `doctor` must print the checklist and exit with a valid code
          # (0/1/2), never crash — regardless of what the runner has installed.
          out="$(./target/release/wg-tui doctor)" && rc=0 || rc=$?
          echo "$out" | grep -q 'WireGuard tools'
          test "$rc" -le 2

      - name: Shell lint the helper & installer
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          bash -n install.sh
          bash -n tests/helper-validation.sh
          bash -n tests/installer-sanity.sh
          shellcheck -S warning install.sh tests/helper-validation.sh tests/installer-sanity.sh
          bash tests/helper-validation.sh target/release/wg-helper
          bash tests/installer-sanity.sh

  audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies against the RUSTSEC advisory DB
        # Fail on real vulnerabilities and on any NEW advisory. The IDs below are
        # pre-existing informational warnings (unmaintained / unsound) in
        # transitive dependencies with no upstream fix yet — accepted knowingly;
        # drop an entry once its upstream updates.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0002
