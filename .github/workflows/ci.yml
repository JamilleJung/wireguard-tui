name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build, fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Smoke test (binary starts & parses args)
        run: |
          ./target/release/wg-tui --version | grep -q '^wg-tui '
          ./target/release/wg-tui --help >/dev/null
          # `doctor` must print the checklist and exit with a valid code
          # (0/1/2), never crash — regardless of what the runner has installed.
          out="$(./target/release/wg-tui doctor)" && rc=0 || rc=$?
          echo "$out" | grep -q 'WireGuard tools'
          test "$rc" -le 2

      - name: Shell lint the helper & installer
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          bash -n packaging/wg-helper
          bash -n install.sh
          shellcheck -S warning packaging/wg-helper install.sh
